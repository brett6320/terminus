name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Only needed for the multi-architecture (arm64) build on merge/tag.
      - name: QEMU Setup
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v4

      - name: Buildx Setup
        uses: docker/setup-buildx-action@v4
        with:
         version: latest

      # Publishing only happens on merge/tag, so skip the login for pull requests.
      - name: Container Registry Login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/usetrmnl/terminus
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      # On pull requests this is a build-only test (no push, native amd64, cached for
      # speed). On merge/tag it builds every platform fresh and publishes to the registry.
      - name: Build and Publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event_name != 'pull_request' }}
