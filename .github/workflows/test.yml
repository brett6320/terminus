name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rspec:
    runs-on: ubuntu-latest
    env:
      HANAMI_ENV: test
      HANAMI_PORT: 2300
      API_URI: http://localhost:2300
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      KEYVALUE_URL: redis://localhost:6379/1

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:9
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare
        run: |
          # The log directory is gitignored, so create it for the app's file logger.
          mkdir -p log
          # Generated at runtime so no secret-shaped value is committed to the repo.
          echo "APP_SECRET=$(openssl rand -hex 40)" >> "$GITHUB_ENV"

      - name: System Dependencies
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y imagemagick libpq-dev libyaml-dev postgresql-client-18

      - name: Ruby Setup
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Packages Install
        run: npm ci

      - name: Assets Compile
        run: bundle exec hanami assets compile

      - name: Database Prepare
        run: bundle exec hanami db prepare

      - name: RSpec
        run: bundle exec rspec
